services:
  - type: web
    name: repo-gpt-ai
    env: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: VECTOR_DB_DIR
        value: /opt/render/project/src/vector-db
      - key: REPOSITORIES_DIR
        value: /opt/render/project/src/repositories