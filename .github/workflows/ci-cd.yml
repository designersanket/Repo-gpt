name: CodeMind AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package.json
          
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci || npm install
          
      - name: Run lint (Express)
        run: |
          cd backend
          # In local settings, runs a check. If lint script is missing, skip or echo success.
          npm run lint --if-present

  lint-python-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt
          
      - name: Install dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt
          
      - name: Run Python syntax validation
        run: |
          python -m py_compile ai-service/*.py

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-python-service]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build AI Service Image (Dry Run)
        uses: docker/build-push-action@v4
        with:
          context: ./ai-service
          push: false
          
      - name: Build Backend Image (Dry Run)
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false

      - name: Build Frontend Image (Dry Run)
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
