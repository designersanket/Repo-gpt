version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: codemind-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - codemind-network

  ai-service:
    build: ./ai-service
    container_name: codemind-ai-service
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REPOSITORIES_DIR=/app/repositories
      - VECTOR_DB_DIR=/app/vector-db
      - ENVIRONMENT=development
    volumes:
      - ./repositories:/app/repositories
      - ./vector-db:/app/vector-db
      - ./ai-service:/app
    depends_on:
      - mongodb
    networks:
      - codemind-network

  backend:
    build: ./backend
    container_name: codemind-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/codemind
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=${JWT_SECRET:-codemind-super-secret-key-123}
      - REPOSITORIES_DIR=/app/repositories
    volumes:
      - ./repositories:/app/repositories
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - ai-service
    networks:
      - codemind-network

  frontend:
    build: ./frontend
    container_name: codemind-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - codemind-network

volumes:
  mongodb_data:

networks:
  codemind-network:
    driver: bridge
